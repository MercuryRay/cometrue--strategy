<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="30日返金保証">
  <defs>
    <linearGradient id="gtG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <!-- Outer ribbon ring -->
  <circle cx="60" cy="60" r="56" fill="url(#gtG)" stroke="#78350f" stroke-width="2"/>
  <!-- Inner disc -->
  <circle cx="60" cy="60" r="44" fill="#fffbeb" stroke="#92400e" stroke-width="2"/>
  <!-- Star accents -->
  <g fill="#f59e0b">
    <circle cx="60" cy="22" r="2.5"/>
    <circle cx="98" cy="60" r="2.5"/>
    <circle cx="60" cy="98" r="2.5"/>
    <circle cx="22" cy="60" r="2.5"/>
  </g>
  <!-- Number 30 -->
  <text x="60" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="30" fill="#b45309">30</text>
  <text x="60" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="9" fill="#78350f">DAYS</text>
  <text x="60" y="88" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="10" fill="#78350f">返金保証</text>
</svg>
